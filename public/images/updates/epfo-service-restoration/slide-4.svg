<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="t d"><title id="t">Do not submit the same request repeatedly</title><desc id="d">Story slide advising EPFO members to avoid duplicate requests during stabilisation.</desc><rect width="1080" height="1350" fill="#fff7ea"/><rect x="70" y="70" width="940" height="1210" rx="50" fill="#fff"/><text x="110" y="150" font-family="Arial" font-size="34" font-weight="700" fill="#b36b00">AMIT'S NEXT MOVE</text><text x="110" y="275" font-family="Arial" font-size="68" font-weight="800" fill="#102a43">Don’t send the</text><text x="110" y="355" font-family="Arial" font-size="68" font-weight="800" fill="#102a43">same claim again.</text><g transform="translate(160 500)"><rect x="0" y="0" width="300" height="470" rx="35" fill="#132238"/><rect x="30" y="55" width="240" height="340" rx="18" fill="#f7fbff"/><text x="70" y="130" font-family="Arial" font-size="28" font-weight="700" fill="#173f5f">Claim submitted</text><rect x="70" y="180" width="160" height="30" rx="15" fill="#0b6b50"/><text x="70" y="285" font-family="Arial" font-size="25" fill="#52606d">Reference saved</text><circle cx="150" cy="430" r="18" fill="#829ab1"/><path d="M390 110h250" stroke="#d84747" stroke-width="28" stroke-linecap="round"/><path d="M515 20v180" stroke="#d84747" stroke-width="28" stroke-linecap="round"/><text x="395" y="305" font-family="Arial" font-size="35" font-weight="700" fill="#9b2c2c">No duplicate request</text><text x="395" y="365" font-family="Arial" font-size="28" fill="#52606d">unless EPFO asks for it</text></g><text x="110" y="1065" font-family="Arial" font-size="39" font-weight="700" fill="#102a43">First check your existing status.</text><text x="110" y="1130" font-family="Arial" font-size="31" fill="#52606d">Repeated submissions may create confusion, not speed.</text><text x="110" y="1220" font-family="Arial" font-size="33" font-weight="700" fill="#b36b00">Save your acknowledgement and wait for an update.</text></svg>