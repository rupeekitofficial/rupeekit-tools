<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="t d"><title id="t">EPFO upgraded its systems</title><desc id="d">Story slide explaining database consolidation and software upgrades.</desc><rect width="1080" height="1350" fill="#eef3fb"/><rect x="70" y="70" width="940" height="1210" rx="50" fill="#fff"/><text x="110" y="150" font-family="Arial" font-size="34" font-weight="700" fill="#1f5b99">WHAT HAPPENED?</text><text x="110" y="275" font-family="Arial" font-size="68" font-weight="800" fill="#102a43">EPFO upgraded</text><text x="110" y="355" font-family="Arial" font-size="68" font-weight="800" fill="#102a43">its digital systems.</text><g transform="translate(140 500)"><rect x="0" y="0" width="260" height="360" rx="28" fill="#d9e9fb"/><ellipse cx="130" cy="70" rx="90" ry="35" fill="#1f5b99"/><rect x="40" y="70" width="180" height="190" fill="#4c83bd"/><ellipse cx="130" cy="260" rx="90" ry="35" fill="#1f5b99"/><path d="M320 150h150" stroke="#0b6b50" stroke-width="24" stroke-linecap="round"/><path d="M430 100l70 50-70 50" fill="none" stroke="#0b6b50" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/><rect x="560" y="0" width="260" height="360" rx="28" fill="#daf3e7"/><circle cx="690" cy="165" r="82" fill="#0b6b50"/><path d="M650 165l28 28 60-72" fill="none" stroke="#fff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/></g><text x="110" y="995" font-family="Arial" font-size="40" font-weight="700" fill="#173f5f">Database consolidation + software upgrade</text><text x="110" y="1060" font-family="Arial" font-size="31" fill="#52606d">The goal: smoother, faster and more reliable services.</text><text x="110" y="1175" font-family="Arial" font-size="35" font-weight="700" fill="#b36b00">But a major upgrade needs time to settle.</text></svg>