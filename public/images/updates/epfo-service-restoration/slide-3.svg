<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="t d"><title id="t">EPFO services return in phases</title><desc id="d">Story slide showing services becoming available gradually after an upgrade.</desc><rect width="1080" height="1350" fill="#f5f3ff"/><rect x="70" y="70" width="940" height="1210" rx="50" fill="#fff"/><text x="110" y="150" font-family="Arial" font-size="34" font-weight="700" fill="#6246a8">THE GOOD NEWS</text><text x="110" y="275" font-family="Arial" font-size="70" font-weight="800" fill="#102a43">Services are live</text><text x="110" y="355" font-family="Arial" font-size="70" font-weight="800" fill="#102a43">again — in phases.</text><g transform="translate(130 500)"><rect x="0" y="0" width="820" height="420" rx="40" fill="#eef1f7"/><rect x="55" y="65" width="210" height="260" rx="24" fill="#d5e7ff"/><rect x="305" y="65" width="210" height="260" rx="24" fill="#dff5e8"/><rect x="555" y="65" width="210" height="260" rx="24" fill="#fff0cc"/><circle cx="160" cy="155" r="48" fill="#1f5b99"/><path d="M135 155l18 18 37-45" fill="none" stroke="#fff" stroke-width="14"/><circle cx="410" cy="155" r="48" fill="#0b6b50"/><path d="M385 155l18 18 37-45" fill="none" stroke="#fff" stroke-width="14"/><circle cx="660" cy="155" r="48" fill="#d38b00"/><path d="M660 125v35l25 20" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round"/><text x="100" y="270" font-family="Arial" font-size="28" font-weight="700" fill="#173f5f">Login</text><text x="344" y="270" font-family="Arial" font-size="28" font-weight="700" fill="#0b6b50">Services</text><text x="595" y="270" font-family="Arial" font-size="28" font-weight="700" fill="#8a5700">Claims</text></g><text x="110" y="1030" font-family="Arial" font-size="39" font-weight="700" fill="#102a43">Some requests may move slowly.</text><text x="110" y="1095" font-family="Arial" font-size="31" fill="#52606d">EPFO says extra checks are being used during stabilisation.</text><text x="110" y="1190" font-family="Arial" font-size="34" font-weight="700" fill="#6246a8">Portal open ≠ every claim completed instantly.</text></svg>