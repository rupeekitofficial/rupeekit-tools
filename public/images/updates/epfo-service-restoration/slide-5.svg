<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="t d"><title id="t">EPFO practical checklist</title><desc id="d">Final story slide with a practical checklist for EPFO members after service restoration.</desc><rect width="1080" height="1350" fill="#eef7f1"/><rect x="70" y="70" width="940" height="1210" rx="50" fill="#fff"/><text x="110" y="150" font-family="Arial" font-size="34" font-weight="700" fill="#0b6b50">WHAT TO DO NOW</text><text x="110" y="275" font-family="Arial" font-size="72" font-weight="800" fill="#102a43">A simple EPFO</text><text x="110" y="360" font-family="Arial" font-size="72" font-weight="800" fill="#102a43">member checklist</text><g font-family="Arial" font-size="34" fill="#243b53"><circle cx="145" cy="535" r="30" fill="#0b6b50"/><path d="M130 535l12 12 22-28" fill="none" stroke="#fff" stroke-width="9"/><text x="200" y="548">Use only the official EPFO portal</text><circle cx="145" cy="665" r="30" fill="#0b6b50"/><path d="M130 665l12 12 22-28" fill="none" stroke="#fff" stroke-width="9"/><text x="200" y="678">Check the existing claim status first</text><circle cx="145" cy="795" r="30" fill="#0b6b50"/><path d="M130 795l12 12 22-28" fill="none" stroke="#fff" stroke-width="9"/><text x="200" y="808">Keep UAN and acknowledgement safe</text><circle cx="145" cy="925" r="30" fill="#0b6b50"/><path d="M130 925l12 12 22-28" fill="none" stroke="#fff" stroke-width="9"/><text x="200" y="938">Avoid repeated submissions</text><circle cx="145" cy="1055" r="30" fill="#0b6b50"/><path d="M130 1055l12 12 22-28" fill="none" stroke="#fff" stroke-width="9"/><text x="200" y="1068">Use official support if delay continues</text></g><rect x="110" y="1155" width="860" height="82" rx="28" fill="#173f5f"/><text x="540" y="1208" text-anchor="middle" font-family="Arial" font-size="31" font-weight="700" fill="#fff">Official facts. Simple explanation. No panic.</text></svg>