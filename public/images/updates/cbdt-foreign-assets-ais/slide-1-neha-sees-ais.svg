    <text x="70" y="185" fill="#1a8e68" font-size="44" font-weight="800" font-family="Arial">AIS</text>
    <rect x="62" y="235" width="220" height="66" rx="18" fill="#e2f0ff"/><text x="172" y="278" text-anchor="middle" fill="#143864" font-size="28" font-weight="700" font-family="Arial">Reports</text>
    <rect x="62" y="335" width="220" height="94" rx="18" fill="#eaf8f2"/><text x="172" y="375" text-anchor="middle" fill="#1a8e68" font-size="24" font-weight="700" font-family="Arial">Foreign Assets</text><text x="172" y="407" text-anchor="middle" fill="#1a8e68" font-size="24" font-weight="700" font-family="Arial">Information</text>
  </g>
  <text x="155" y="1100" fill="#12253f" font-size="44" font-weight="800" font-family="Arial">“Is this a tax notice?”</text>
  <text x="70" y="1290" fill="#fff" font-size="23" font-weight="700" font-family="Arial">Story 1 of 6</text><text x="1010" y="1290" text-anchor="end" fill="#fff" font-size="20" font-family="Arial">Educational update • Verify official source</text>
