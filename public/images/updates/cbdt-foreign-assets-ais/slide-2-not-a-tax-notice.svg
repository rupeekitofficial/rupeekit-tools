<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">The AIS foreign-assets view is meant to help</title>
  <desc id="desc">Visual comparison explaining that the AIS foreign-assets feature is for taxpayer support and not a standalone investigation notice.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#144f45"/><stop offset="1" stop-color="#0c2d3e"/></linearGradient><filter id="s"><feDropShadow dy="14" stdDeviation="14" flood-opacity=".2"/></filter></defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <circle cx="92" cy="78" r="22" fill="#1a8e68"/><text x="92" y="88" text-anchor="middle" fill="#fff" font-size="25" font-weight="700" font-family="Arial">₹</text><text x="130" y="87" fill="#fff" font-size="25" font-weight="700" font-family="Arial">RupeeKit</text>
  <text x="70" y="178" fill="#fff" font-size="58" font-weight="800" font-family="Arial">No — it is meant to help</text>
  <text x="70" y="240" fill="#d8eee8" font-size="29" font-family="Arial">CBDT says the feature is facilitative and not designed</text><text x="70" y="278" fill="#d8eee8" font-size="29" font-family="Arial">as a scrutiny or investigation tool.</text>
  <rect x="70" y="340" width="940" height="840" rx="42" fill="#fbfdfb" filter="url(#s)"/>
  <rect x="120" y="450" width="390" height="560" rx="34" fill="#eaf8f2"/>
  <circle cx="315" cy="585" r="78" fill="#1a8e68"/><text x="315" y="612" text-anchor="middle" fill="#fff" font-size="78" font-weight="800" font-family="Arial">✓</text>
  <text x="315" y="745" text-anchor="middle" fill="#12253f" font-size="45" font-weight="800" font-family="Arial">Purpose</text>
  <text x="165" y="820" fill="#53677e" font-size="29" font-family="Arial">Help taxpayers view</text><text x="165" y="858" fill="#53677e" font-size="29" font-family="Arial">available information</text><text x="165" y="896" fill="#53677e" font-size="29" font-family="Arial">and report correctly.</text>
  <rect x="570" y="450" width="390" height="560" rx="34" fill="#fff0ed"/>
  <circle cx="765" cy="585" r="78" fill="#e25353"/><text x="765" y="610" text-anchor="middle" fill="#fff" font-size="78" font-weight="800" font-family="Arial">×</text>
  <text x="765" y="745" text-anchor="middle" fill="#12253f" font-size="43" font-weight="800" font-family="Arial">Not the purpose</text>
  <text x="615" y="820" fill="#53677e" font-size="29" font-family="Arial">It is not presented as</text><text x="615" y="858" fill="#53677e" font-size="29" font-family="Arial">a standalone notice or</text><text x="615" y="896" fill="#53677e" font-size="29" font-family="Arial">investigation screen.</text>
  <text x="540" y="1110" text-anchor="middle" fill="#0a2040" font-size="32" font-weight="800" font-family="Arial">Read the official details before assuming the worst.</text>
  <text x="70" y="1290" fill="#fff" font-size="23" font-weight="700" font-family="Arial">Story 2 of 6</text><text x="1010" y="1290" text-anchor="end" fill="#fff" font-size="20" font-family="Arial">Educational update • Verify official source</text>
</svg>