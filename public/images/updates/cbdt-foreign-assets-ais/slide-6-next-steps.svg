<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Next steps after downloading Foreign Assets Information</title>
  <desc id="desc">Indian taxpayer comparing the AIS foreign-assets report with personal bank and investment records before filing.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#114e3d"/><stop offset="1" stop-color="#0a2d39"/></linearGradient><filter id="s"><feDropShadow dy="14" stdDeviation="14" flood-opacity=".2"/></filter></defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <circle cx="92" cy="78" r="22" fill="#1a8e68"/><text x="92" y="88" text-anchor="middle" fill="#fff" font-size="25" font-weight="700" font-family="Arial">₹</text><text x="130" y="87" fill="#fff" font-size="25" font-weight="700" font-family="Arial">RupeeKit</text>
  <text x="70" y="178" fill="#fff" font-size="58" font-weight="800" font-family="Arial">Neha’s calm next step</text>
  <text x="70" y="240" fill="#d9efe8" font-size="28" font-family="Arial">Use the report as a cross-check, compare it with personal</text><text x="70" y="278" fill="#d9efe8" font-size="28" font-family="Arial">records, and verify the correct return schedules.</text>
