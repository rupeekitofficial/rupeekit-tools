    <path d="M105 115c10-90 150-100 160 0v-45C235 0 132 0 105 70z" fill="#2a1f1f"/>
    <circle cx="158" cy="120" r="7" fill="#12253f"/><circle cx="210" cy="120" r="7" fill="#12253f"/>
    <path d="M160 158q25 20 50 0" fill="none" stroke="#12253f" stroke-width="5" stroke-linecap="round"/>
    <rect x="70" y="215" width="230" height="290" rx="72" fill="#f4bf3e"/>
    <rect x="5" y="385" width="360" height="40" rx="18" fill="#0a2040"/>
    <rect x="45" y="255" width="280" height="140" rx="20" fill="#143864"/><rect x="63" y="275" width="244" height="102" rx="12" fill="#e2f0ff"/>
