  <text x="730" y="505" text-anchor="middle" fill="#0a2040" font-size="39" font-weight="800" font-family="Arial">Before filing</text>
  <g font-family="Arial">
    <circle cx="585" cy="590" r="25" fill="#1a8e68"/><text x="585" y="600" text-anchor="middle" fill="#fff" font-size="22" font-weight="800">✓</text><text x="630" y="580" fill="#12253f" font-size="24" font-weight="700">Download the correct</text><text x="630" y="610" fill="#12253f" font-size="24" font-weight="700">calendar-year report</text>
    <circle cx="585" cy="700" r="25" fill="#1a8e68"/><text x="585" y="710" text-anchor="middle" fill="#fff" font-size="22" font-weight="800">✓</text><text x="630" y="690" fill="#12253f" font-size="24" font-weight="700">Compare with bank and</text><text x="630" y="720" fill="#12253f" font-size="24" font-weight="700">investment records</text>
    <circle cx="585" cy="810" r="25" fill="#1a8e68"/><text x="585" y="820" text-anchor="middle" fill="#fff" font-size="22" font-weight="800">✓</text><text x="630" y="800" fill="#12253f" font-size="24" font-weight="700">Review Schedule FA and</text><text x="630" y="830" fill="#12253f" font-size="24" font-weight="700">Schedule FSI applicability</text>
    <circle cx="585" cy="920" r="25" fill="#1a8e68"/><text x="585" y="930" text-anchor="middle" fill="#fff" font-size="22" font-weight="800">✓</text><text x="630" y="910" fill="#12253f" font-size="24" font-weight="700">Use official or qualified</text><text x="630" y="940" fill="#12253f" font-size="24" font-weight="700">tax help when needed</text>
