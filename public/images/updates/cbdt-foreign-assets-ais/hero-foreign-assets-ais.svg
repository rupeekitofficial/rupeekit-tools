<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Foreign Assets Information in AIS</title>
  <desc id="desc">Indian taxpayer reviewing the new Foreign Assets Information report in AIS before filing an income-tax return.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a2040"/>
      <stop offset="1" stop-color="#07505b"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-opacity=".22"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="170" r="330" fill="#1d7d7c" opacity=".55"/>
  <g fill="none" stroke="#82d6c4" stroke-width="4" opacity=".8">
    <ellipse cx="1320" cy="170" rx="300" ry="300"/>
    <ellipse cx="1320" cy="170" rx="160" ry="300"/>
    <ellipse cx="1320" cy="170" rx="45" ry="300"/>
    <ellipse cx="1320" cy="170" rx="300" ry="110"/>
    <ellipse cx="1320" cy="170" rx="300" ry="220"/>
  </g>
  <g transform="translate(80 60)">
