    <text x="24" y="34" fill="#fff" text-anchor="middle" font-size="28" font-weight="700" font-family="Arial, sans-serif">₹</text>
    <text x="62" y="33" fill="#fff" font-size="28" font-weight="700" font-family="Arial, sans-serif">RupeeKit</text>
  </g>
  <text x="80" y="230" fill="#fff" font-size="86" font-weight="800" font-family="Arial, sans-serif">Foreign Assets in AIS</text>
  <text x="80" y="315" fill="#dceef2" font-size="38" font-family="Arial, sans-serif">CBDT’s new view can help taxpayers cross-check</text>
  <text x="80" y="365" fill="#dceef2" font-size="38" font-family="Arial, sans-serif">foreign bank accounts, investments and income.</text>
  <rect x="80" y="485" width="720" height="105" rx="28" fill="#ffffff" opacity=".12" stroke="#9adfd1" stroke-width="2"/>
  <text x="120" y="550" fill="#fff" font-size="31" font-weight="700" font-family="Arial, sans-serif">Not a tax notice. A taxpayer-support feature.</text>
  <g transform="translate(1010 330)" filter="url(#shadow)">
