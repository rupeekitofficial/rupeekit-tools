<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">How to access Foreign Assets Information in AIS</title>
  <desc id="desc">Five-step visual showing how to open AIS Reports and download Foreign Assets Information for a selected calendar year.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#0c4656"/><stop offset="1" stop-color="#0a223d"/></linearGradient><filter id="s"><feDropShadow dy="14" stdDeviation="14" flood-opacity=".2"/></filter></defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <circle cx="92" cy="78" r="22" fill="#1a8e68"/><text x="92" y="88" text-anchor="middle" fill="#fff" font-size="25" font-weight="700" font-family="Arial">₹</text><text x="130" y="87" fill="#fff" font-size="25" font-weight="700" font-family="Arial">RupeeKit</text>
  <text x="70" y="178" fill="#fff" font-size="58" font-weight="800" font-family="Arial">How Neha can check it</text>
  <text x="70" y="240" fill="#d6edf1" font-size="28" font-family="Arial">The official note gives a five-step path inside the e-Filing</text><text x="70" y="278" fill="#d6edf1" font-size="28" font-family="Arial">and Compliance portals.</text>
  <rect x="70" y="340" width="940" height="840" rx="42" fill="#f9fcfc" filter="url(#s)"/>
  <g font-family="Arial">
    <line x1="165" y1="455" x2="165" y2="1005" stroke="#78baa9" stroke-width="8" stroke-linecap="round"/>
    <circle cx="165" cy="455" r="42" fill="#1a8e68"/><text x="165" y="469" text-anchor="middle" fill="#fff" font-size="30" font-weight="800">1</text>
    <rect x="235" y="405" width="690" height="100" rx="24" fill="#fff" stroke="#d5e6e3" stroke-width="2"/><text x="270" y="465" fill="#12253f" font-size="28" font-weight="800">Log in to the official e-Filing portal</text>
    <circle cx="165" cy="595" r="42" fill="#1a8e68"/><text x="165" y="609" text-anchor="middle" fill="#fff" font-size="30" font-weight="800">2</text>
    <rect x="235" y="545" width="690" height="100" rx="24" fill="#fff" stroke="#d5e6e3" stroke-width="2"/><text x="270" y="605" fill="#12253f" font-size="28">Open AIS</text>
    <circle cx="165" cy="735" r="42" fill="#1a8e68"/><text x="165" y="749" text-anchor="middle" fill="#fff" font-size="30" font-weight="800">3</text>
    <rect x="235" y="685" width="690" height="100" rx="24" fill="#fff" stroke="#d5e6e3" stroke-width="2"/><text x="270" y="745" fill="#12253f" font-size="28">On Compliance Portal, select Reports</text>
    <circle cx="165" cy="875" r="42" fill="#1a8e68"/><text x="165" y="889" text-anchor="middle" fill="#fff" font-size="30" font-weight="800">4</text>
    <rect x="235" y="825" width="690" height="100" rx="24" fill="#fff" stroke="#d5e6e3" stroke-width="2"/><text x="270" y="885" fill="#12253f" font-size="28">Choose Foreign Assets Information</text>
    <circle cx="165" cy="1015" r="42" fill="#1a8e68"/><text x="165" y="1029" text-anchor="middle" fill="#fff" font-size="30" font-weight="800">5</text>
    <rect x="235" y="965" width="690" height="110" rx="24" fill="#fff" stroke="#d5e6e3" stroke-width="2"/><text x="270" y="1010" fill="#12253f" font-size="27" font-weight="800">Select calendar year and download</text><text x="270" y="1047" fill="#12253f" font-size="27" font-weight="800">the PDF</text>
  </g>
  <text x="70" y="1290" fill="#fff" font-size="23" font-weight="700" font-family="Arial">Story 4 of 6</text><text x="1010" y="1290" text-anchor="end" fill="#fff" font-size="20" font-family="Arial">Educational update • Verify official source</text>
</svg>