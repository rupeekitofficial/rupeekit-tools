name: CBDT Update Validation

on:
  push:
    branches:
      - content/cbdt-foreign-assets-ais-july-2026
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
