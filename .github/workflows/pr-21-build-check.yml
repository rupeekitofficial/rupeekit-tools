name: PR 21 Build Check

on:
  push:
    branches:
      - demo/daily-govt-finance-story-2026-07-22
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
